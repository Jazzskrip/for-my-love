<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b1026">
    <meta name="format-detection" content="telephone=no">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎄</text></svg>">
    <title>Адвент-календарь для любимой</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Mulish:wght@300;400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- DEBUG: шрифты для Pickle Rick темы -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/games.css">
    <link rel="stylesheet" href="css/games/day3-hacker.css">
</head>
<body>
    <div class="coupon-overlay" id="couponOverlay" aria-hidden="true">
        <div class="coupon-card" id="couponCard">
            <h3>Специальный Купон!! 🎉</h3>
            <p id="couponMessage">Нажми, чтобы получить подарок.</p>
            <div class="coupon-title" id="couponTitle"></div>
            <div class="coupon-desc" id="couponDesc"></div>
        </div>
    </div>
    <canvas class="snow-canvas" id="snowCanvas"></canvas>
    <canvas class="confetti-canvas" id="confettiCanvas"></canvas>
    <div class="container">
        <header>
            <div class="user-panel-wrap">
                <div class="user-panel" id="userPanel">
                    <div class="user-name" id="userName"></div>
                    <div class="progress-counter user-progress" id="progressCounter">Открыто 0/13</div>
                </div>
                <button class="user-coupons-btn" id="userCouponsBtn" type="button">Купоны</button>
                <!-- DEBUG MENU: кнопка + нативный select для дебаг-действий -->
                <div class="debug-menu-wrap">
                    <button class="debug-menu-btn" id="debugMenuBtn" type="button" aria-label="Debug menu">&#9660;</button>
                    <select class="debug-menu-select" id="debugMenuSelect">
                        <option value="" disabled selected>Debug...</option>
                        <optgroup label="Стиль">
                            <option value="__style_default">Основной</option>
                            <option value="__style_pickle">Pickle Rick</option>
                        </optgroup>
                        <optgroup label="Палитра (основной)">
                            <option value="rose">Розовая</option>
                            <option value="lavender">Лавандовая</option>
                            <option value="mint">Мятная</option>
                        </optgroup>
                        <optgroup label="Палитра (Pickle)">
                            <option value="pickle_portal">+ Портал</option>
                            <option value="pickle_morty">Морти</option>
                        </optgroup>
                        <optgroup label="Дата">
                            <option value="__date_1">День 1</option>
                            <option value="__date_5">День 5</option>
                            <option value="__date_15">День 15</option>
                            <option value="__date_30">День 30</option>
                            <option value="__date_real">Реальная дата</option>
                        </optgroup>
                        <optgroup label="Игры">
                            <option value="__game_coin">Монетка</option>
                            <option value="__game_flappy">Flappy Bird</option>
                            <option value="__game_roulette">Рулетка</option>
                            <option value="__game_day3hacker">День 3: Хакер</option>
                        </optgroup>
                        <optgroup label="Данные">
                            <option value="__reset">Сброс прогресса</option>
                        </optgroup>
                    </select>
                </div>
                <!-- /DEBUG MENU -->
            </div>
            <h1 id="pageTitle">Адвент-календарь</h1>
            <p class="subtitle" id="pageSubtitle">13 дней общения для вас</p>
        </header>

        <div class="calendar-grid" id="calendar"></div>

        <div class="instructions"><p id="instructionsText">Нажимай на день, чтобы открыть задание. Дни открываются по очереди.</p></div>
    </div>
    <button class="info-fab" id="infoButton" type="button" aria-label="Справка">i</button>
    <div class="info-overlay" id="infoOverlay" aria-hidden="true">
        <div class="info-card" role="dialog" aria-modal="true" aria-label="Справка">
            <button class="info-close" type="button" aria-label="Закрыть справку">×</button>
            <h3 id="infoTitle">Справка</h3>
            <div class="info-list" id="infoList"></div>
        </div>
    </div>
    <div class="user-coupon-overlay" id="userCouponOverlay" aria-hidden="true">
        <div class="user-coupon-card" role="dialog" aria-modal="true">
            <div class="user-coupon-head">
                <h3>Мои купоны</h3>
                <button class="user-coupon-close" id="userCouponClose" type="button" aria-label="Закрыть">×</button>
            </div>
            <div class="user-coupon-list" id="userCouponList"></div>
        </div>
    </div>

    <!-- Видео-модалка -->
    <div class="video-overlay" id="videoOverlay" aria-hidden="true">
        <div class="video-card" role="dialog" aria-modal="true">
            <div class="video-content" id="videoContent"></div>
            <div class="video-btn-wrap" id="videoBtnWrap">
                <span class="video-timer" id="videoTimer"></span>
                <button class="video-close-btn" id="videoCloseBtn" type="button">Продолжить</button>
            </div>
        </div>
    </div>

    <!-- Игровая модалка -->
    <div class="game-overlay" id="gameOverlay" aria-hidden="true">
        <div class="game-card" role="dialog" aria-modal="true">
            <div class="game-content" id="gameContent"></div>
        </div>
    </div>

    <script src="js/effects.js"></script>
    <script src="js/games/coin.js"></script>
    <script src="js/games/flappy.js"></script>
    <script src="js/games/roulette.js"></script>
    <script src="js/games/day3-hacker.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
